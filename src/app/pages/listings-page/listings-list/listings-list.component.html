<section class="listings-full-page">
    <div class="container-fluid p-0">
        <div class="row g-0">
            <!-- Listings Panel -->
            <div class="col-lg-7 listings-panel">
                <div class="listings-scroll-content p-4">
                    <!-- Premium Search Filter Bar -->
                    <div class="filter-header-premium mb-4" data-aos="fade-down">
                        <div class="row g-3 align-items-center">
                            <!-- Search -->
                            <div class="col-md-4">
                                <div class="premium-input-group">
                                    <i class="fa-solid fa-magnifying-glass"></i>
                                    <input type="text" class="form-control"
                                        placeholder="{{ 'SEARCH_PLACEHOLDER' | translate }}" [(ngModel)]="searchQuery"
                                        (keyup.enter)="applyFilters()" />
                                </div>
                            </div>

                            <!-- Actions -->
                            <div class="col-md-2 ms-auto">
                                <div class="filter-actions-group d-flex gap-1 justify-content-end">
                                    <button class="btn btn-near-me-premium" [class.active]="isNearMeActive"
                                        [disabled]="isLocating" (click)="toggleNearMe()"
                                        [title]="'NEAR_ME' | translate">
                                        <i class="fa-solid" [class.fa-location-crosshairs]="!isLocating"
                                            [class.fa-spinner]="isLocating" [class.fa-spin]="isLocating"></i>
                                    </button>
                                    <button class="btn btn-filter-premium" [class.active]="filterOpenNow"
                                        (click)="filterOpenNow = !filterOpenNow; applyFilters()"
                                        [title]="'OPEN_NOW' | translate">
                                        <i class="fa-solid fa-clock"></i>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- Hierarchical Filters Row -->
                        <div class="row g-2 mt-2">
                            <!-- Dynamic Cascading Categories -->
                            <div class="col-md-3" *ngFor="let level of categoryLevels; let i = index">
                                <div class="premium-select-group">
                                    <i class="fa-solid fa-layer-group"></i>
                                    <app-searchable-select
                                        [options]="level"
                                        [value]="selectedCategoryPath[i]"
                                        (valueChange)="selectedCategoryPath[i] = $event; onCategoryChange(i)"
                                        [placeholder]="'ALL_CATEGORIES' | translate"
                                        [allOptionLabel]="'ALL_CATEGORIES' | translate"
                                        [searchPlaceholder]="'SEARCH_PLACEHOLDER' | translate"
                                        [noResultsLabel]="'NO_LISTINGS_FOUND' | translate">
                                    </app-searchable-select>
                                </div>
                            </div>

                            <!-- Dynamic Cascading Locations -->
                            <div class="col-md-3" *ngFor="let level of locationLevels; let i = index">
                                <div class="premium-select-group">
                                    <i class="fa-solid fa-location-dot"></i>
                                    <app-searchable-select
                                        [options]="level"
                                        [value]="selectedLocationPath[i]"
                                        (valueChange)="selectedLocationPath[i] = $event; onLocationChange(i)"
                                        [placeholder]="'ALL_LOCATIONS' | translate"
                                        [allOptionLabel]="'ALL_LOCATIONS' | translate"
                                        [searchPlaceholder]="'SEARCH_PLACEHOLDER' | translate"
                                        [noResultsLabel]="'NO_LISTINGS_FOUND' | translate">
                                    </app-searchable-select>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Listings Count -->
                    <div class="listings-results-info mb-4 d-flex justify-content-between align-items-center">
                        <h5 class="m-0 fw-bold">{{ listings.length }} {{ 'RESULTS_FOUND' | translate }}</h5>
                        <div class="view-toggles d-none d-md-flex gap-2">
                          
                        </div>
                    </div>

                    <!-- Listings List -->
                    <div class="row" *ngIf="isLoading">
                        <div class="col-md-4 mb-4" *ngFor="let item of [1,2,3,4,5,6]">
                            <div class="skeleton-loader card-skeleton"></div>
                        </div>
                    </div>

                    <div class="row" *ngIf="!isLoading">
                        <div class="col-md-4 mb-4" *ngFor="let listing of listings; let i = index">
                            <app-content-card [item]="listing" [routePath]="'/listings'" [animationDelay]="i * 0.1">
                            </app-content-card>
                        </div>

                        <div class="col-12 text-center py-5" *ngIf="listings.length === 0">
                            <div class="empty-state">
                                <i class="fa-solid fa-search-minus display-4 mb-3 opacity-20"></i>
                                <p class="text-muted">{{ 'NO_LISTINGS_FOUND' | translate }}</p>
                            </div>
                        </div>
                    </div>

                    <!-- Pagination -->
                    <div class="mt-4">
                        <app-pagination [meta]="meta" (pageChange)="onPageChange($event)"></app-pagination>
                    </div>
                </div>
            </div>

            <!-- Map Panel -->
            <div class="col-lg-5 map-panel d-none d-lg-block">
                <div id="listings-map-sticky"></div>
            </div>
        </div>
    </div>
</section>
